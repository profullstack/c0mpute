# c0mpute plugin manifest. See dips/0006-module-model.md.
#
# Source code lives upstream at github.com/infernetprotocol/infernet-protocol, NOT
# this repo. This directory is a marketplace wrapper only.

[module]
id          = "infernet"
name        = "Infernet Protocol — AI inference"
version     = "0.2.15"
kind        = "workload"
description = "Decentralized AI inference workloads on c0mpute. Runs models on consumer/prosumer GPUs with model-hash and runtime-image verification."
author      = "Infernet Protocol"
license     = "MIT"
homepage    = "https://infernetprotocol.com"
source      = "https://github.com/infernetprotocol/infernet-protocol"
keywords    = ["ai", "llm", "inference", "gpu"]

[module.requirements]
c0mpute      = ">=0.1.0"
os           = ["linux", "darwin"]
arch         = ["x86_64", "aarch64"]
capabilities = ["gpu:nvidia?", "model-runtime"]

[module.workloads]
"infernet.inference" = { command = "run", validation = "schema_and_spotcheck" }

[module.dispatch]
mode   = "subprocess"
binary = "infernet"

[module.surfaces]
cli = "infernet"
# web = "c0mpute.com/infernet"   # planned
