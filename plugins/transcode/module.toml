# c0mpute plugin manifest. See dips/0006-module-model.md.
#
# transcode is the only first-party in-tree plugin: its workload code is
# compiled INTO the c0mpute binary itself (mode = "in-process"). The
# implementation lives at node/crates/c0mpute-transcode in this repo.

[module]
id          = "transcode"
name        = "FFmpeg Transcoding"
version     = "0.2.9"
kind        = "workload"
description = "Decentralized audio/video transcoding via FFmpeg with hardware acceleration (NVENC, QSV, AMF, VideoToolbox, AV1)."
author      = "Profullstack"
license     = "MIT"
source      = "https://github.com/profullstack/c0mpute/tree/master/plugins/transcode"
keywords    = ["ffmpeg", "transcode", "video", "audio", "hls", "av1"]

[module.requirements]
c0mpute      = ">=0.1.0"
os           = ["linux", "darwin"]
arch         = ["x86_64", "aarch64"]
capabilities = ["ffmpeg", "gpu:nvidia?", "gpu:intel?", "gpu:amd?"]

[module.workloads]
"ffmpeg.transcode" = { command = "transcode", validation = "ffprobe" }

[module.dispatch]
mode = "in-process"
# The handler is compiled into the c0mpute binary. No separate install
# step needed — installing c0mpute installs transcode automatically.

[module.surfaces]
cli = "c0mpute transcode"
# web = "c0mpute.com/transcode"   # planned

[module.config.defaults]
preset = "video-1080p"
